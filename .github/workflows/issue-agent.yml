name: 🤖 Autonomous Agent (Issue Trigger)

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  agent-response:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Repository Code
        uses: actions/checkout@v4

      - name: 🐍 Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ⚡ Restore Cached Python Packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📥 Install Downloaded Libraries
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🤖 Run Cloud Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          AGENT_TASK: "${{ github.event.issue.title }}\n${{ github.event.issue.body }}"
        run: python agent.py

      - name: 📝 Commit Output and Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create unique branch
          BRANCH_NAME="agent/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH_NAME"
          
          # Move output to docs folder
          mkdir -p docs/agent_responses
          mv output.txt "docs/agent_responses/issue-${{ github.event.issue.number }}.md"
          
          # Commit and push
          git add "docs/agent_responses/issue-${{ github.event.issue.number }}.md"
          git commit -m "Agent Response to Issue #${{ github.event.issue.number }}"
          git push -u origin "$BRANCH_NAME"
          
          # Create PR
          PR_URL=$(gh pr create \
            --title "Agent Response: ${{ github.event.issue.title }}" \
            --body "Automated response generated by the serverless agent platform for issue #${{ github.event.issue.number }}." \
            --base main \
            --head "$BRANCH_NAME")
            
          # Comment on the original issue
          gh issue comment "${{ github.event.issue.number }}" --body "The agent has completed the task and prepared a response! Review the results here: $PR_URL"
