name: 🚀 Run Serverless Cloud Agent

on:
  workflow_dispatch:
    inputs:
      agent_task:
        description: 'What mission do you want to give your agent today?'
        required: true
        default: 'Verify system architecture and check memory connection.'

jobs:
  execute-agent:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Pull the codebase into the free 16GB runner
    - name: 📂 Checkout Repository Code
      uses: actions/checkout@v4

    # 2. Set up the free cloud Python environment
    - name: 🐍 Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Fast dependency restore using our caching hack
    - name: ⚡ Restore Cached Python Packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 4. Install our libraries (google-antigravity and supabase)
    - name: 📥 Install Downloaded Libraries
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 5. Run our agent script with secure keys passed from secrets
    - name: 🤖 Awaken Cloud Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        AGENT_TASK: ${{ github.event.inputs.agent_task }}
      run: python agent.py
