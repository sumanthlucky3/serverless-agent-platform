name: 🤖 Process Agent Task

on:
  # Triggered via GitHub API from the frontend when a task is submitted
  repository_dispatch:
    types: [run-agent-task]
  # Also allow manual trigger from GitHub UI for testing
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Supabase session ID to process'
        required: true
      agent_id:
        description: 'Agent to use (agent_general, agent_docs, agent_jobs)'
        required: false
        default: 'agent_general'
      task:
        description: 'Task description'
        required: true

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('serverless-agent-platform/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ./serverless-agent-platform
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Mark session as active
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SESSION_ID: ${{ github.event.client_payload.session_id || github.event.inputs.session_id }}
        run: |
          python - <<'EOF'
          import os
          from supabase import create_client
          supabase = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_KEY"])
          sid = os.environ.get("SESSION_ID")
          if sid:
              supabase.table("agent_sessions").update({"status": "active"}).eq("id", int(sid)).execute()
              print(f"Session {sid} marked active.")
          EOF

      - name: Run agent dispatcher
        working-directory: ./serverless-agent-platform
        env:
          OPENROUTER_API_KEY: ${{ secrets.VITE_OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          AGENT_ID: ${{ github.event.client_payload.agent_id || github.event.inputs.agent_id || 'agent_general' }}
          AGENT_TASK: ${{ github.event.client_payload.task || github.event.inputs.task }}
          SESSION_ID: ${{ github.event.client_payload.session_id || github.event.inputs.session_id }}
        run: python -m agents.dispatcher

      - name: Mark session as done
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SESSION_ID: ${{ github.event.client_payload.session_id || github.event.inputs.session_id }}
        run: |
          python - <<'EOF'
          import os
          from supabase import create_client
          supabase = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_KEY"])
          sid = os.environ.get("SESSION_ID")
          if sid:
              supabase.table("agent_sessions").update({"status": "done"}).eq("id", int(sid)).execute()
              print(f"Session {sid} marked done.")
          EOF

      - name: Mark session as failed
        if: failure()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SESSION_ID: ${{ github.event.client_payload.session_id || github.event.inputs.session_id }}
        run: |
          python - <<'EOF'
          import os
          from supabase import create_client
          supabase = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_KEY"])
          sid = os.environ.get("SESSION_ID")
          if sid:
              supabase.table("agent_sessions").update({"status": "failed"}).eq("id", int(sid)).execute()
              print(f"Session {sid} marked failed.")
          EOF
